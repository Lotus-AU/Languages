Name: Russian
Authors:
- TommyXL
- MogekoNik
- Cruel
Translations:
  Roles:
    Assassin:
      RoleName: Ассасин
      Description: >-
        Ассасин это Предатель, который также может убивать не-Предателей, угадывая их роли. Нельзя угадывать роли Предателей.

        Во время собрания можно выбрать игрока, проголосовав за него. После голосования используйте команду чата (/cmd [название роли]),
        чтобы выбрать роль для угадывания.

        Чтобы завершить угадывание, проголосуйте за игрока ещё раз для подтверждения. Если угадывание верное — игрок умирает, иначе умирает Ассасин.

        Чтобы отменить угадывание, пропустите голос в любой момент — следующий голос будет обычным.

        Примечание: Раскрытые роли (например, от Оракула) угадать нельзя.
      Blurb: Убивай и угадывай роли игроков
    Blackmailer:
      RoleName: Шантажист
      Description: Морфнитесь в игрока, чтобы шантажировать его. Во время собрания у зашантажированного игрока будет отображаться текст «ШАНТАЖИРОВАН», видимый всем игрокам.\n\nЕсли игрок попытается говорить в чате во время шантажа, он может получить предупреждение с напоминанием молчать. Когда количество предупреждений достигнет максимального порога (установленного хостом), игрок будет казнён.
      Blurb: Шантажируй игроков, заставляя их молчать
      Options:
        WarningsUntilDeath: Предупреждений до смерти
        ShowBlackmailedToAll: Показывать шантаж всем
        BlackmailerIsSSBased: Шантажист использует Оборотня
      BlackmailedMessage: Вас шантажируют! Отправка сообщения в чат убьёт вас.
      WarningMessage: Вам запрещено говорить! Если вы заговорите снова, вас могут убить.
      BlackmailedText: ШАНТАЖИРОВАН
      BlackmailingMode: Шантаж
      BlackmailButtonText: Шантажировать
    BountyHunter:
      RoleName: Охотник за Головами
      Description: Охотник за Головами получает цель для убийства (отмечена чёрным именем). Если Охотник убивает свою цель, откат убийства значительно сокращается для следующего убийства.\n\nВремя до смены цели, откат убийства после убийства цели и откат после убийства не-цели задаются хостом в настройках.
      Blurb: Убивай цели, чтобы сократить откат убийства
      Options:
        TimeUntilNewTarget: Время до смены цели
        AfterKillingTarget: Откат убийства после убийства цели
        AfterKillingNonTarget: Откат убийства после убийства не-цели
    Camouflager:
      RoleName: Камуфляжер
      Description: Морфнитесь в игрока и заставьте всех живых игроков морфнуться в того же игрока на короткое время. Когда время истечёт или будет вызвано собрание, все игроки вернутся к своему обычному облику.
      Blurb: Замаскируй всех
      Options:
        CamouflageCooldown: Откат камуфляжа
        CamouflageDuration: Длительность камуфляжа
      ButtonText: Камуфляж
    Consort:
      RoleName: Консорт
      Description: Используйте кнопку питомца для переключения между блокировкой роли и убийством.\n\nБлокировка роли игрока не позволяет ему убивать, сообщать о трупах, вызывать собрания, морфаться и использовать вентиляцию.
      Blurb: Блокируй роли игроков
      Options:
        roleblockCooldown: Откат блокировки роли
        roleblockDuration: Длительность блокировки роли
      ButtonText: Заблокировать роль
    Creeper:
      RoleName: Крипер
      Description: Единственная задача Крипера — нанести как можно больше разрушений. Используйте кнопку питомца или морфа (по выбору хоста), чтобы убить себя и любого игрока в указанном радиусе.\n\nВозможно, вам повезёт и щит защитит вас от взрыва (например, щит Медика). Если опция отключена, даже щит Медика вас не спасёт.
      Blurb: Взрывай игроков
      Options:
        BomberProtection: Бомбардировщик защищён щитом
        ExplosionRadius: Радиус взрыва
        CreeperProtection: Защищён щитом
        CreeperGracePeriod: Период неуязвимости
        CanKillNormal: Может убивать обычным способом
      ExplosionGracePeriod: 'Период неуязвимости от взрыва: {0}'
      ButtonText: Подорвать
    Disperser:
      RoleName: Рассеиватель
      Description: Рассеиватель может использовать кнопку питомца, чтобы телепортировать всех к случайным вентиляциям.
      Blurb: Телепортируй игроков
      Options:
        DisperseCooldown: Откат рассеивания
        DisperserGetsDispersed: Рассеиватель::0 тоже рассеивается
      ButtonText: Рассеять
    Escapist:
      RoleName: Беглец
      Description: Первое нажатие кнопки питомца отмечает вашу текущую позицию.\n\nПосле установленного отката вы можете нажать кнопку питомца снова, чтобы телепортироваться обратно к отмеченному месту. После этого способность метки снова уйдёт на откат.
      Blurb: Отметь место и стратегически сбеги
      Options:
        MarkCooldown: Откат после метки
        EscapeCooldown: Откат после побега
        ClearAfterMeeting: Сбросить метку после собрания
      MarkButtonText: Отметить
      EscapeButtonText: Сбежать
    FireWorks:
      RoleName: Фейерверк
      Description: >-
        Используйте кнопку морфа, чтобы установить фейерверк (то есть бомбу) по карте. Затем в любой момент нажмите кнопку питомца, чтобы взорвать фейерверки, убив всех в радиусе взрыва.

        Примечание: Взрыв проходит сквозь стены. Фейерверк также может убивать обычным способом между установкой фейерверков.
      Blurb: Устанавливай фейерверки, чтобы взрывать игроков
      Options:
        PlantFireworkCooldown: Откат установки фейерверка
        TotalFireworks: Всего зарядов фейерверка
        AbleToDetonateText: Подрыв готов!
        AbleToDetonateEarly: Подрывать только когда последний Предатель::0
      AbleToDetonateEarly: Подрывать только когда последний Предатель::0
      AbleToDetonateText: Подрыв готов!
      Mutable:
        DetonateOnlyWhenLastImpostor: Вы можете подрывать только когда вы последний предатель, а не в любое время.
      ButtonText: Установить
    Freezer:
      RoleName: Заморозщик
      Description: Заморозщик может заморозить игрока на месте, морфаясь в него. Игрок будет заморожен до тех пор, пока Заморозщик не вернётся в своё обличие. Заморозщик может убивать как в облике, так и в своём обычном виде.
      Blurb: Замораживай игрока, морфай в него
      Options:
        FreezeCooldown: Откат заморозки
        FreezeDuration: Длительность заморозки
      ButtonText: Заморозить
    Grenadier:
      RoleName: Гренадёр
      Description: Используйте кнопку питомца, чтобы взорвать гранату, ослепляющую ближайших игроков на фиксированном расстоянии. Она также может ослеплять союзников-Предателей в зависимости от настроек хоста. В это время Гренадёр может убивать незамеченным.
      Blurb: Ослепляй ближайших игроков
      Options:
        AmountOfGrenades: Количество гранат
        BlindCooldown: Откат ослепления
        BlindDuration: Длительность ослепления
        BlindRadius: Радиус эффекта ослепления
        CanBlindAllies: Может ослеплять союзников
      ButtonText: Граната
    IdentityThief:
      RoleName: Похититель личности
      Description: Похититель личности морфнется в того, кого убивает. Маскировка сохраняется до тех пор, пока он не будет готов убить снова, или, по желанию, до следующего убийства, когда он морфниться в следующую жертву.
      Blurb: Перевоплощайся в свою жертву
      Options:
        DisguiseSettings: Настройки маскировки
        UntilKillCooldown: Откат убийства
        UntilNextKill: До следующего убийства
        TotallySwapIdentity: Полная смена личности
        UntilMeeting: До собрания
    Impostor:
      RoleName: Предатель
      Blurb: Убивай членов экипажа и нейтралов.
      Description: Обычный предатель. Убей всех остальных игроков, кроме союзников, и оставайся последней фракцией в живых.
    Janitor:
      RoleName: Уборщик
      Description: Уборщик может выбирать между убийством и уборкой по окончании отката убийства.\n\nУборщик может убрать труп, нажав кнопку сообщения, делая его невозможным для обнаружения, или использовать кнопку убийства для убийства игроков.\n\nУборщик может сообщать о трупах обычным способом только пока находится на откате.
      Blurb: Убирай трупы, делая их необнаруживаемыми.
      Options:
        CleanOnKill: Убирать при убийстве
        KillCooldownMultiplier: Множитель отката убийства
      ButtonText: Убрать
    Mafioso:
      Options:
        StartsGameWithGun: Начинает игру с оружием
        ModifyShopCosts: Изменить стоимость в магазине
        GunCost: Стоимость оружия
        BulletCost: Стоимость патрона
        VestCost: Стоимость жилета
        RoleRevealerCost: Стоимость раскрывателя роли
        GunCooldown: Откат оружия
        CashFromReporting: Деньги за сообщение о трупах
        RefreshTasks: Обновлять задания при завершении всех
      CashText: 'Деньги::0: {0}'
      GunItem: Томми-ган
      VestItem: Бронежилет
      BulletItem: Патрон
      RevealerItem: Раскрыватель роли
      RevealerReady: Раскрыватель роли готов
      ShopMessage: >-
        Вы — член Мафии! Во время собраний вы можете покупать предметы.
        Чтобы купить предмет, сначала проголосуйте за себя до тех пор, пока предмет не будет выбран.
        Затем пропустите, чтобы продолжить.

        Голосование за ЛЮБОГО ДРУГОГО игрока будет засчитано как обычный голос,
        иначе вы останетесь в режиме магазина.
      SelectedItemMessage: Вы выбрали покупку {0}. После покупки у вас останется {1} денег. Нажмите кнопку пропуска, чтобы подтвердить покупку.
      PurchaseItemMessage: 'Вы купили: {0}. Теперь у вас осталось {1} денег.'
      RoleName: Мафиози
      Blurb: Зарабатывай деньги, выполняя задания
      Description: Мафиози — уникальная роль предателя, который не может убивать сразу. Вместо этого Мафиози должен выполнять задания, чтобы зарабатывать деньги. Во время собраний Мафиози может тратить деньги на различные предметы.\n\nТомми-ган — позволяет Мафиози убивать (разовая покупка)\n\nПатрон — необходим для использования томми-гана\n\nБронежилет — даёт Мафиози одноразовую неуязвимость в следующем раунде\n\nРаскрыватель роли — позволяет Мафиози раскрыть роль одного другого игрока\n\nВведите /cmd o, чтобы узнать стоимость каждого предмета. В магазине отображаются только предметы, которые вы можете использовать или купить.
      CanVoteOtherPlayers: Теперь вы можете голосовать обычным образом, так как проголосовали за кого-то другого, а не за себя.
      CanVoteOtherPlayersOnSkip: Теперь вы можете голосовать обычным образом, так как пропустили голос перед выбором покупки.
    Mare:
      RoleName: Маре
      Description: 'Маре получает особые способности во время определённых саботажей (задаётся хостом). Эти способности могут включать: увеличение скорости и уменьшение отката убийства.\n\nОсторожно! Если включено в настройках, ваше имя будет отображаться фиолетовым, пока способность активна.'
      Blurb: Устраивай саботаж, чтобы раскрыть свои силы
      Options:
        SpeedDuringSabotage: Модификатор скорости во время саботажа
        KillWithoutSabotage: Может убивать без саботажа
        KillCooldown: Обычный откат убийства
        ColoredName: Цветное имя во время саботажа
        SabotageKillCooldown: Откат убийства во время саботажа
        SabotageSettings: Настройки конкретного саботажа
    Mastermind:
      RoleName: Вдохновитель
      Description: Вдохновитель отмечает игрока кнопкой убийства.\n\nЧерез некоторое время этому игроку появится текст о том, что им манипулируют, и начнётся обратный отсчёт. Игрок должен убить другого игрока до окончания отсчёта (кнопкой питомца или убийства), иначе совершит самоубийство.\n\nВдохновитель не может убивать обычным способом.
      Blurb: Манипулируй и управляй другими
      Options:
        ManipulatedPlayerLimit: Лимит манипулируемых игроков
        ImpostorsCanSeeManipulated: Предатели::0 могут видеть манипулируемых
        TimeUntilSuicide: Время до самоубийства
        ManipulationCooldown: Откат манипуляции
        KillerCDAfterManipulate: Откат убийцы после манипуляции
      ManipulatedText: Под контролем
      KillImploredText: >-
        Вы <b>ДОЛЖНЫ</b> убить кого-нибудь за {0}

        (Используйте кнопку убийства или питомца!)
      ManipulateButtonText: Манипулировать
    Miner:
      RoleName: Шахтёр
      Description: Используйте кнопку питомца для телепортации к последней использованной вентиляции. Убивайте, используйте вентиляцию и устраивайте саботажи, как любой другой Предатель.
      Blurb: Используй кнопку питомца для телепортации к вентиляциям
      Options:
        AbilityCooldown: Откат способности Шахтёра
      ButtonText: Копать
    Ninja:
      RoleName: Ниндзя
      Description: Используйте кнопку питомца или морфа (по выбору хоста), чтобы переключаться между режимами охоты и убийства.\n\nВ режиме охоты используйте кнопку убийства, чтобы отметить цель, затем нажмите кнопку питомца (или верните облик), чтобы телепортировать игрока к себе (или себя к игроку, в зависимости от настроек) и совершить убийство.
      Blurb: Незаметно убивай своих жертв
      Options:
        TeleportToNinja: Игроки телепортируются к Ниндзя
        AbilityActiviation: Активация способности Ниндзя
      HuntButtonText: Охотиться
    Phantom:
      RoleName: Фантом
      Description: Фантом может становиться невидимым на определённый период времени. В невидимости он может использовать вентиляцию, но не может убивать. Это обычная роль Предателя.
      Blurb: Становись невидимым
      Options:
        VanishCooldown: Откат исчезновения
        VanishDuration: Длительность исчезновения
        ImmuneToRangedInteractions: Иммунитет к дальним взаимодействиям
        RemainingTaskWarning: Предупреждение об оставшихся заданиях
        RemainingTaskTargetable: Оставшиеся задания для возможности атаки
    PickPocket:
      RoleName: Карманник
      Description: Карманник — это Предатель, который получает дополнительный голос за каждого убитого игрока. Голоса накапливаются и делают Карманника очень мощным.
      Blurb: Кради голоса у своих жертв
      Options:
        MaximumAdditionalVotes: Максимум дополнительных голосов
        ResetVotesAfterMeeting: Сбросить голоса после собраний
    Puppeteer:
      RoleName: Кукловод
      Description: Используйте кнопку убийства рядом с игроком, чтобы взять его под контроль. Контролируемый игрок будет вынужден убить следующего встреченного не-Предателя.\n\nЕсли убитый игрок обладает способностью, активируемой при смерти, эффект достанется контролируемому игроку, а не Кукловоду. Кукловод не может убивать обычным способом.
      Blurb: Используй игроков как своих кукол
      ButtonText: Управлять
      Options:
        PuppetCooldown: Откат управления
        KillerCDAfterPuppet: Откат убийцы после управления
    SerialKiller:
      RoleName: Маньяк
      Description: >-
        У Маньяка значительно сокращённый откат убийства (задаётся хостом), однако рядом с его именем отображается таймер. Каждый раз, когда Маньяк убивает, таймер сбрасывается. Если таймер достигнет 0, Маньяк умрёт.

        Примечание: Если параметр «Таймер начинается после первого убийства» выключен, таймер самоубийства будет продлён на то же количество, что и «Первый откат убийства» в настройках игры.
      Blurb: Убивай быстро, чтобы оставаться в живых
      Options:
        TimeUntilSuicide: Время до самоубийства
        TimerAfterFirstKill: Таймер начинается после первого убийства
    Shapeshifter:
      RoleName: Оборотень
      Description: Оборотень может морфаться в любого игрока, который был жив в конце последнего собрания. Это обычная роль Предателя.
      Blurb: Маскируйся под других
      Options:
        ShapeshiftCooldown: Откат морфа
        ShapeshiftDuration: Длительность морфа
    Sniper:
      RoleName: Снайпер
      Description: Используйте кнопку морфа, чтобы принять облик другого игрока. Сделайте 1-2 шага в направлении выстрела. Верните облик, чтобы выстрелить. Пуля полетит в этом направлении и убьёт игроков на линии огня. Снайпер не может убивать обычным способом, пока у него есть патроны.
      Blurb: Убивай с большого расстояния
      Options:
        SniperBulletCount: Количество патронов Снайпера
        SnipingCooldown: Откат стрельбы
        RefundBulletOnKill: Возврат патрона при убийстве
        PreciseShooting: Точная стрельба
        PlayerPiercing: Пробитие игроков
      ButtonText: Прицелиться
    Swooper:
      RoleName: Невидимка
      Description: Невидимка может становиться невидимым, прыгая в вентиляцию. В невидимости Невидимка может делать всё обычное (убивать, устраивать саботажи, использовать вентиляцию).\n\nОсторожно! В зависимости от настроек хоста вы можете быть раскрыты при убийстве другого игрока.
      Blurb: Используй вентиляцию, чтобы стать невидимым
      Options:
        InvisibilityCooldown: Откат невидимости
        SwoopingDuration: Длительность недимости
        SeenByAllies: Виден союзникам
        VentDuringCooldown: Можно использовать вентиляцию во время отката
        InvisibleOnKill: Оставаться невидимым при убийстве
        ReturnLocation: Место возврата при окончании невидимости
        CurrentLocation: Текущее место
        StartLocation: Начальное место
      ButtonText: Нырнуть
    TimeThief:
      RoleName: Вор времени
      Description: За каждое убийство Вор времени сокращает общее время собрания на определённое количество.\n\nВ зависимости от настроек хоста время собрания может быть восстановлено до обычного после смерти Вора времени.
      Blurb: Кради время с собраний
      Options:
        MeetingTimeStolen: Украденное время собрания
        MinVotingTime: Минимальное время голосования
        ReturnTimeAfterDeath: Вернуть украденное время после смерти
    Vampire:
      RoleName: Вампир
      Description: Вампир кусает свои цели, что приводит к отложенному убийству. Укушенный игрок умрёт через несколько секунд или когда будет вызвано следующее собрание. Если Вампир кусает Приманку, Вампир автоматически сообщит о трупе после задержки убийства.
      Blurb: Отложенные убийства
      Options:
        KillDelay: Задержка убийства
      ButtonText: Укусить
    Vampiress:
      RoleName: Вампирша
      Description: Как и Вампир, Вампирша может кусать игроков, которые умрут через определённое время (задаётся хостом), однако она также может наносить прямые удары, как обычные предатели. Используйте кнопку питомца для переключения между укусами и убийствами. Вампирша — скрытая роль, которая иногда появляется *вместо* Вампира.
      Blurb: Отложенные и обычные убийства
    Viper:
      Options:
        DissolveTime: Время растворения
      RoleName: Гадюка
      Blurb: Убивай, чтобы растворять трупы
      Description: Гадюка — это роль Предателя, которая растворяет тела игроков после убийства. После определённого времени труп полностью исчезнет и больше не сможет быть обнаружен. Существует 3 стадии растворения, а время полного исчезновения задаётся хостом.
    Warlock:
      RoleName: Колдун
      Description: Используйте кнопку убийства, чтобы проклясть игрока. При следующем морфе Колдуна проклятый игрок убьёт ближайшего к нему человека.\n\nКолдун может убивать обычным способом в облике морфа. Если настройка включена, проклятые игроки убьют случайного игрока сразу после проклятия.\n\nОсторожно! Проклятые игроки могут убивать Предателей (и даже самого Колдуна!).
      Blurb: Проклинай игроков и заставляй их убивать других
      Options:
        CursedKillImmediately: Проклятые игроки убивают немедленно
        LimitedCurseKillRange: Ограниченный радиус убийства проклятием
      ButtonText: Проклясть
    Witch:
      RoleName: Ведьма
      Description: Кнопка убийства/заклинания Ведьмы чередует между наложением заклинания и убийством игроков.\n\nИгроки, заколдованные Ведьмой, будут видны с крестом рядом с именем во время собрания. Если Ведьма не будет изгнана в ходе этого собрания, заколдованный игрок умрёт.\n\nОбычное убийство автоматически сообщает о Приманке.\nЗаклинание не сообщает о Приманке.
      Blurb: Убивай и заклинай игроков
      Options:
        FreelySwitchModes: Свободно переключать режимы
        SwitchModesAfterAttack: Переключать режимы после атаки
      CursedMessage: '{0}::0 заколдовал {1}::1, чтобы тот умер в конце следующего собрания.'
      CursingModeText: Заклинание
      KillingModeText: Убийство
      HexedCauseOfDeath: Заколдован
      CursedStatusDescription: Вас заколдовали. Заколдованные игроки умрут после собрания, если источник заклинания (Ведьма) не будет изгнан.
      CursingButtonText: Заколдовать
      KillButtonText: Убить
    YinYanger:
      RoleName: Инь-Янгер
      Description: Инь-Янгер это Предатель с возможностью заставить двух игроков убить друг друга. Используйте кнопку убийства, чтобы отметить двух игроков. Когда они окажутся в радиусе убийства друг от друга, они убьют друг друга.\n\nИнь-Янгер может также убивать обычным способом после установки 2 целей.
      Blurb: Настраивай игроков друг против друга
      Options:
        YinYangCooldown: Откат Инь-Янгера
    CrewPostor:
      RoleName: Двуликий
      Description: Выполняйте задание, чтобы мгновенно убить ближайшего к вам игрока (включая предателей и другие убивающие роли). Двуликий побеждает вместе с Предателями.
      Blurb: Выполняй задания, чтобы убивать
      Options:
        CanKillAllies: Может убивать союзников
        WarpToTarget: Телепортироваться к цели
        RefreshTasks: Обновлять задания при завершении всех
    MadGuardian:
      RoleName: Покровитель
      Description: Покровитель это Член экипажа на стороне Предателей, который после выполнения всех заданий становится неуязвимым к убийствам.\n\nБезумный страж не знает, кто является Предателями, и Предатели не могут отличить его от других Членов экипажа.
      Blurb: Выполни задания, чтобы стать неубиваемым
    MadSnitch:
      RoleName: Доносчик
      Description: Доносчик это Член экипажа на стороне Предателей, который после выполнения всех заданий сможет видеть, кто является Предателями, чтобы помочь снять с них подозрения.\n\nПредатели не могут отличить Безумного стукача от других Членов экипажа.
      Blurb: Выполни задания, чтобы видеть Предателей
    Madmate:
      RoleName: Безумец
      Description: Безумец  это Член экипажа на стороне Предателей. Он не может убивать и не имеет заданий.\n\nОн не знает, кто является Предателями, и Предатели не могут отличить его от других Членов экипажа.\n\nЕго единственная задача — попытаться выяснить, кто Предатели, и снять с них подозрения.
      Blurb: Предай членов экипажа
    Parasite:
      RoleName: Паразит
      Description: Паразит  это убийца на стороне Предателей, который умеет убивать, но не знает, кто является Предателями, и наоборот.\n\nПаразит может делать всё, что Оборотень, и должен работать вместе с Предателями, чтобы победить вместе.
      Blurb: Работай с Предателями, чтобы победить.
    Alchemist:
      RoleName: Алхимик
      Blurb: Собирай ингредиенты для создания идеальных зелий
      Description: >
        Алхимик — универсальная роль Члена экипажа, который собирает «ингредиенты».
        Ингредиенты можно найти следующими способами:
          • Катализатор — находится при выполнении заданий
          • Сущность зрения — находится при починке света
          • Фрагмент обсуждений — находится случайно в группах из 3 и более игроков
          • Смещающаяся роза — находится после морфа игрока
          • Щель Теты — находится случайно
          • Флакон разложения — находится рядом с трупами
        Алхимик может использовать кнопку питомца для подбора ингредиентов,
        и получит сообщение под именем: «Найдено: [Название ингредиента]».

        Алхимик использует ингредиенты для создания зелий. Чтобы перейти в «режим создания»,
        удерживайте кнопку питомца. В режиме создания кнопку питомца можно использовать для переключения следующего создаваемого зелья.

        В меню создания удерживайте кнопку питомца для выхода. Если у Алхимика есть все необходимые ингредиенты
        для выбранного зелья, оно начнёт создаваться при удерживании кнопки питомца.

        Когда у Алхимика есть зелье, он может удерживать кнопку питомца для его использования.
      Ingredients:
        Catalyst: Катализатор
        Chaos: Щель Теты
        Death: Флакон разложения
        Purity: Смещающаяся роза
        Sight: Сущность зрения
        Tinkering: Фрагмент обсуждений
      CraftingPotionText: 'Создание:'
      Potions:
        Death: Зелье смерти
        Protection: Зелье защиты
        Random: Нестабильное снадобье
        Revealing: Безмятежная благодать
        Sabotage: Смесь механика
        Sight: Зелье зрения
        Teleportation: Зелье телепортации
        Voting: Зелье лидера
      FoundIngredientText: 'Найдено:'
    Altruist:
      RoleName: Альтруист
      Description: Сообщи о трупе, чтобы воскресить игрока ценой собственной жизни. В зависимости от настроек воскрешение может быть отложено. Если во время ожидания будет вызвано собрание, воскрешение отменяется и ничего не происходит.
      Blurb: Воскрешай игроков
      Options:
        ReviveDelay: Задержка воскрешения
        InstantText: Мгновенно
        KillerArrow: Убийца получает стрелку к воскрешённому игроку
        PortableVitals: Имеет портативные пульсы
      ButtonText: Воскресить
    Bastion:
      RoleName: Бастион
      Description: Используйте кнопку вентиляции, чтобы заложить бомбу в вентиляцию. Она убьёт следующего игрока, который воспользуется этой вентиляцией. Бомбы действуют только один раунд и сбрасываются после каждого собрания.\n\nОсторожно! Бастион может подорваться сам, если использует вентиляцию, в которой уже заложена бомба.
      Blurb: Минируй вентиляции
      Options:
        PlantBombCooldown: Откат закладки бомбы
        BombsPerRound: Бомб за раунд
      ButtonText: Заминировать
    Bodyguard:
      RoleName: Телохранитель
      Description: >-
        Как Телохранитель, вы должны выбрать игрока, которого хотите защитить.

        Телохранитель должен выбрать игрока, проголосовав за него на собрании
        (это не считается голосом). Когда цель Телохранителя атакуют,
        атакующий погибает вместе с Телохранителем, а цель остаётся живой.

        После голосования за цель Телохранитель может голосовать или пропускать голос свободно.

        Примечание: После защиты цели Телохранителем рядом с защищённым игроком появятся 2 трупа (Телохранителя и атакующего).
      Blurb: Пожертвуй жизнью ради защиты другого
      ProtectingMessage: 'Вы сейчас защищаете:'
      VotePlayerInfo: Проголосуйте, чтобы выбрать игрока для охраны.
      Options:
        BeneficialInteractionProtection: Защита от полезных::0 взаимодействий
        NeutralInteractionProtection: Защита от нейтральных::0 взаимодействий
      BodyguardHelpMessage: 'Вы — Телохранитель! Ваш долг: защищать невиновных! Проголосуйте за игрока, которого хотите защитить в следующем раунде! Или пропустите голос, чтобы вернуться к обычному голосованию.'
    Chameleon:
      RoleName: Хамелеон
      Description: Хамелеон может использовать вентиляцию, чтобы временно стать невидимым.\n\nОбратный отсчёт невидимости отображается под именем, и игрок снова появится через определённое время.
      Blurb: Маскируйся с окружением
      Options:
        InvisibilityDuration: Длительность невидимости
        InvisibilityCooldown: Откат невидимости
      HiddenText: Скрыт::0 {0}
      TimesInvisibleStatistic: Раз невидим
      ButtonText: Скрыться
    Charmer:
      RoleName: Чародей
      Description: >-
        Чародей может использовать кнопку питомца/убийства, чтобы очаровывать Предателей или Нейтральных убийц, заставляя их перейти на сторону Членов экипажа.

        Очарованные игроки будут знать, что очарованы, и потеряют способность убивать других игроков.

        Если Чародей попытается очаровать Члена экипажа, он промахнётся и умрёт.

        Примечание: Если Чародей активирует способность кнопкой питомца, хост может потребовать выполнения заданий перед использованием способности. Эта опция недоступна, если «Кнопка способности» установлена на «Кнопка убийства».
      Blurb: Очаровывай врагов, чтобы они перешли на твою сторону
      Options:
        AbilityButton: Кнопка способности
        KillButton: Кнопка убийства
        PetButton: Кнопка питомца
        TasksPerAbility: Заданий для перезарядки способности
        CharmingCooldown: Откат очарования
        CharmedPlayersWinWithCrew: Очарованные игроки побеждают с экипажем
        BreakCharmOnDeath: Снять очарование при смерти Чародея::0
        MaxCharmedPlayers: Максимум очарованных игроков
      CharmedText: Очарован
      CharmedStatistic: Очарованные игроки
      CharmedDescription: Вас очаровали. Пока вы очарованы, вы не можете убивать Членов экипажа и считаетесь их союзником.
      ButtonText: Очаровать
    Crewmate:
      RoleName: Член экипажа
      Description: Обычный Член экипажа. Победите, выполнив все задания со своими товарищами по экипажу, или станьте последней оставшейся фракцией.
      Blurb: Найди Предателей и выполни задания
      Options:
        OverrideRoleTasks: Изменить задания {0}
        AllowCommonTasks: Разрешить общие задания
        CustomLongTasks: '{0} длинных заданий'
        CustomShortTasks: '{0} коротких заданий'
    Crusader:
      RoleName: Крестоносец
      Description: Используйте кнопку убийства, чтобы выбрать цель.\n\nЦель будет защищена от атак, и вы автоматически убьёте любого, кто взаимодействует с вашей целью.
      Blurb: Защищай игроков от атак
      Options:
        BeneficialInteractionProtection: Защита от полезных::0 взаимодействий
        NeutralInteractionProtection: Защита от нейтральных::0 взаимодействий
      ButtonText: Защитить
    Demolitionist:
      RoleName: Подрывник
      Description: Когда Подрывника убивают, он взрывает землю, давая убийце несколько секунд, чтобы найти вентиляцию. Если убийца не успевает воспользоваться вентиляцией, он погибает от взрыва.\n\nУбийца получает уведомление о том, что убил Подрывника, в виде текстового индикатора над именем.
      Blurb: Взрывай своего убийцу
      YouKilledDemoMessage: Вы убили {0}! Прыгайте в вентиляцию, чтобы выжить!
    Detective:
      Options:
        SuspectsPerCase: Подозреваемых на дело
      RoleName: Детектив
      Blurb: Собирай улики. Раскрывай убийства.
      Description: Детектив — роль Члена экипажа, расследующего трупы для нахождения убийцы. На собраниях он может использовать улики от репортёра, чтобы определить, где находится труп и какова роль убийцы. В раундах он может расследовать игроков, чтобы узнать, где они находились в момент убийства.
    Dictator:
      RoleName: Диктатор
      Description: >-
        Три вещи происходят, когда Диктатор голосует за кого-то на собрании:

        1. Он принудительно завершает собрание.

        2. Проголосованный игрок изгоняется.

        3. Диктатор жертвует собой (умирает), если у него не осталось диктаторских голосов.

        Примечание: Ничего не происходит, если Диктатор пропускает голос.
      Blurb: Диктуй ход собрания
      Options:
        NumberOfDictates: Количество диктатур
        SuicideIfVoteCrewmate: Самоубийство при изгнании Члена экипажа::0
        ShowDictatorVoteAtMeetingEnd: Показывать диктатуру в конце собрания
      LynchEventMessage: '{0}::0 линчевал {1}::1.'
      DictateMessage: '{0} был изгнан {1}::0'
      PlayersEjectedStat: Изгнано игроков
    Doctor:
      RoleName: Доктор
      Description: У Доктора есть портативная панель пульсов, как у обычной роли Учёного. Проверяйте её регулярно, чтобы получить приблизительное время смерти.\n\nВо время собрания (и закрыв чат) Доктор может видеть причину смерти игрока в скобках под его именем.
      Blurb: Узнавай, как умерли игроки
      Options:
        DoctorIsModifier: Доктор является модификатором
    Duplicator:
      Options:
        DuplicateCooldown: Откат дублирования
        DuplicateDuration: Длительность дублирования
        SpawnLocation: Место появления
        CurrentLocation: Текущее место
        RandomLocation: Случайное место
        KillRadius: Радиус убийства
        OnlyKillUnalliedPlayers: Убивать только несоюзных игроков
      RoleName: Дупликатор
      Blurb: Дублируй себя
      TrickedCauseOfDeath: Обманут
      Description: Используйте кнопку питомца, чтобы создать клон себя. Клоны удаляются на собрании, при смерти или отключении. В зависимости от настроек хоста клоны могут появляться рядом с вами или в случайной комнате. Нельзя размещать клонов рядом с людьми.
      Mutable:
        KillRadius: Любой, кто подойдёт на расстояние {0} к вашему клону, будет убит.
      ButtonText: Дублировать
    Engineer:
      RoleName: Инженер
      Description: Инженер может использовать вентиляцию для перемещения по карте. Это обычная роль Among Us.
      Blurb: Перемещайся по карте через вентиляции
      Options:
        VentCooldown: Откат вентиляции
        VentDuration: Длительность вентиляции
    Escort:
      RoleName: Эскорт
      Description: Эскорт может использовать кнопку питомца для блокировки ролей других игроков.\n\nБлокировка роли игрока не позволяет ему убивать, сообщать о трупах, вызывать собрания, морфаться и использовать вентиляцию.
      Blurb: Блокируй роли игроков
      Options:
        RoleblockCooldown: Откат блокировки роли
        RoleblockDuration: Длительность блокировки роли
    ExConvict:
      RoleName: Бывший заключённый
      Description: Первое нажатие кнопки питомца отмечает вашу текущую позицию.\n\nПосле установленного отката вы можете нажать кнопку питомца снова, чтобы телепортироваться обратно к отмеченному месту. После этого способность метки снова уйдёт на откат.
      Blurb: Подготовь место и сбеги
      Options:
        MarkCooldown: Откат после метки
        EscapeCooldown: Откат после побега
        ClearAfterMeeting: Сбросить метку после собрания
    Genie:
      RoleName: Джинн
      Options:
        SuccessChance: Шанс успеха
        MaxGifts: Максимум желаний
      WishFailed: Вы попытались даровать {0} модификатор {1}, но это не удалось.
      WishGranted: Вы даровали {0} модификатор {1} и это удалось! Им был предоставлен модификатор!
      MeetingMessage: Проголосуйте за игрока дважды, чтобы исполнить желание! Или пропустите голос для обычного голосования.
      OutOfWishes: У вас закончились желания. Вы больше не сможете голосовать за кого-то в начале собрания.
      Blurb: Дари игрокам модификаторы
      AlreadyWished: Вы уже даровали {0} модификатор. Попробуйте другого игрока!
      Description: На собраниях у вас есть шанс выбрать игрока, которому будет дарован модификатор. Джинн может даровать только положительные модификаторы, включённые хостом. Шанс не гарантирован, попытка может провалиться, и вы потеряете желание. Нельзя дважды даровать желание одному игроку.
    Herbalist:
      RoleName: Травник
      Description: Используйте кнопку питомца, чтобы посадить семя на игрока. Через установленное время счётчик «Цветения» этого игрока увеличится.\n\nПосле нескольких цветений одного игрока под его именем появится иконка цветка. После этого вы можете нажать кнопку питомца, чтобы раскрыть роль этого игрока.\n\nЕсли продолжать использовать кнопку питомца на игроке, можно будет раскрыть его роль другим игрокам.
      Blurb: Сажай семена, чтобы медленно собирать информацию
      Options:
        TimeUntilBloom: Время до цветения
        BloomsUntilRoleReveal: Цветений до раскрытия роли
        PlantBloomCooldown: Откат посадки цветка
        RevealOnBloom: Раскрывать при цветении
      BloomsGrownStatistic: Выращено цветков
      RolesRevealedStatistic: Раскрыто ролей
      ButtonText: Посадить
    Investigator:
      RoleName: Следователь
      Description: >-
        Используйте кнопку питомца, чтобы проверить, хороший игрок или плохой. Имена проверенных игроков будут отображаться зелёным или красным цветом. В общем, красный — плохой, зелёный — хороший.

        Осторожно, в зависимости от настроек хоста некоторые роли Членов экипажа (например, Шериф) могут отображаться как плохие!

        Игроки с модификатором Нарушитель будут отображаться красным только если параметр «Нейтральные убийцы» установлен на «Все».
      Blurb: Расследуй игроков
      Options:
        InvestigateCooldown: Откат расследования
        NeutralKillingRed: Нейтральные::1 убийцы::2 отображаются красным::0
        NeutralPassiveRed: Нейтральные::1 пассивные::2 отображаются красным::0
        MadmateRed: Безумцы::1 отображаются красным::0
        CrewKillingRed: Убийцы экипажа::1 отображаются красным::0
      ButtonText: Расследовать
    Jailor:
      Options:
        JailCooldown: Откат заключения
        JailorActionButton: Кнопка действия тюремщика
        MaxExecutionTimes: Максимум казней
        JailedPlayersVoteCounts: Голос заключённого засчитывается Тюремщику
        JailedShowsToAll: Заключённый виден всем
      JailedText: ПОД СТРАЖЕЙ
      JailorMessage: Проголосуйте за заключённого, чтобы казнить его. В зависимости от настроек вы можете умереть, если он окажется членом экипажа. Также он может быть вынужден голосовать за того же игрока, что и вы. Никто не может голосовать за заключённого, и его нельзя убить кроме как вами.
      JailedMessage: Вас заключили под стражу. Вы не можете голосовать и угадывать. Однако игроки не могут проголосовать за вас. Надейтесь, что Тюремщик не казнит вас.
      PublicExecuteMessage: Заключённый ({0}) был казнён.
      CannotVote: Вы не можете голосовать за заключённого!
      RoleName: Тюремщик
      Blurb: Заключай и казни убийц
      Description: Используйте кнопку питомца/убийства, чтобы выбрать игрока для заключения на собрании. На собрании заключённый может быть показан всем в зависимости от настроек. Заключённый не может голосовать или использовать способности роли на собрании. Однако другие игроки также не могут голосовать за заключённого.\nВы можете казнить игрока, проголосовав за него. В зависимости от настроек вы можете совершить самоубийство, если он является членом экипажа. У вас ограниченное количество казней.\nВ зависимости от настроек заключённый может «голосовать» вместе с вами, то есть если вы голосуете за кого-то, он будет вынужден голосовать за того же игрока.
      ButtonText: Заключить
    Mayor:
      RoleName: Мэр
      Description: Голос Мэра засчитывается несколько раз.\n\nВ зависимости от настроек он может вызывать экстренные собрания, используя кнопку питомца.\n\nТакже есть опция, при которой Мэр должен раскрыть свою роль перед получением дополнительных голосов (раскрыться — проголосовав за себя).
      Blurb: Ваш голос имеет больший вес
      RevealMessage: Мэр, вы должны раскрыться, чтобы получить дополнительные голоса. Сейчас вы можете голосовать обычным образом, но если проголосуете за себя, то раскроете свою роль всем и получите больше голосов!
      Options:
        MayorReveal: Раскрыться для голосов
        MayorAdditionalVotes: Дополнительные голоса Мэра
        PocketMeeting: Карманное собрание
        NumberOfUses: Количество использований
      MayorRevealTitle: Раскрытие Мэра
      MayorRevealMessage: '{0} раскрылся как мэр!'
      ButtonText: Кнопка
    Medic:
      RoleName: Медик
      Description: Медик может проголосовать за игрока, которого хочет защитить. Этот игрок будет защищён от атак, пока Медик жив.\n\nГолосование за игрока для защиты не считается голосом, и после выбора игрока для защиты Медик может голосовать или пропускать голос свободно.\n\nВ зависимости от настроек хоста Медик может менять защищаемого игрока на следующих собраниях.
      Blurb: Защити игрока щитом
      ProtectingMessage: 'Вы сейчас защищаете: {0}'
      VotePlayerInfo: Проголосуйте, чтобы выбрать игрока для охраны.
      MedicHelpMessage: Вы — Медик! Проголосуйте за игрока, которого хотите защитить в следующем раунде! Или пропустите голос, чтобы вернуться к обычному голосованию.
      SelectedPlayerMessage: Вы решили защитить {0}. Проголосуйте за него снова, чтобы подтвердить, или пропустите голос, чтобы вернуться к обычному голосованию.
      ReturnToNormalVoting: Теперь вы защищаете {0}. Ваш следующий голос работает как обычно.
      Options:
        ChangeGuardedPlayer: Менять охраняемого игрока
        OnDeathValue: После смерти
        MeetingsValue: Собрания
        NeverValue: Никогда
        CanProtectSamePlayer: Можно защищать одного игрока дважды подряд
      MustSelectNewTarget: Вы защищали {0} в прошлом раунде. Вы должны выбрать другую цель в этом раунде
    Medium:
      RoleName: Медиум
      Description: Когда Медиум сообщает о трупе, он получает сообщение в чате собрания, сообщающее роль убийцы этого трупа.\n\nМедиум может видеть роль убийцы только если сам сообщил о трупе.\n\nВ зависимости от настроек хоста у него также может быть стрелка, указывающая на трупы.\n\nПосле сообщения о трупе у Медиума может быть возможность поговорить с сообщённым игроком. В начале собрания Медиум и сообщённый игрок будут уведомлены, что они связаны для общения.\n\nМедиум может задавать вопросы, а мёртвый игрок может отвечать только «да» или «нет».
      Blurb: Раскрывай роль убийцы при сообщении о трупе
      MediumMessage: Вы сообщили о трупе и, после долгого разговора с духами, определили, что роль убийцы — {0}.
      Options:
        HasArrowsToBody: Стрелки к трупам
        CanSeeChatOfReportedPlayer: Может говорить с призраком сообщённого
        IsClairvoyant: Может говорить с мёртвыми
        ShownToEveryone: Ответы видны всем
        AmountOfMeditates: Количество медитаций
      MediumTitle: Медитация
      MediumConnection: Теперь вы можете говорить с призраком {0}. Он может отвечать «да» или «нет» на ваши вопросы. У вас осталось {1} медитаций.
      MediumConnectionGhost: Медиум {0} связался с вами. Вы можете говорить с ним, отвечая ТОЛЬКО «да» или «нет».
      YesAnswer: да
      NoAnswer: нет
      OutOfMeditates: У вас закончились медитации. Ваша связь с призраком прервана.
      OutOfMeditatesGhost: Ваша связь с Медиумом прервана. Ваши ответы больше не слышны.
      Mutable:
        HasArrowstoBodies: Вы можете видеть стрелки, ведущие к трупам после их смерти.
        AmountofMeditates: Вы можете задать {0} вопросов до закрытия связи.
    Mystic:
      RoleName: Мистик
      Description: Когда игрока убивают, Мистик получает короткую вспышку и оповещение. Это очень похоже на срабатывание реактора.\n\nИспользуйте это оповещение для приблизительного определения времени смерти.
      Blurb: Получай уведомления об убийствах игроков
      Options:
        MysticIsModifier: Мистик является модификатором
        FlashDuration: Длительность вспышки
        SendAudioAlert: Отправлять звуковое оповещение
        RestrictedToCrewmates: Ограничен до Членов экипажа::0
    Noisemaker:
      RoleName: Паникёр
      Description: Когда игрок убивает Паникёра, кратко рассылается визуальное и звуковое оповещение со стрелкой, указывающей направление к его трупу. Это обычная роль Among Us.
      Blurb: Рассылай оповещение при убийстве
      Options:
        ImpostorsGetAlert: Предатели получают оповещение
        AlertDuration: Длительность оповещения
    Observer:
      RoleName: Наблюдатель
      Description: Выполняйте задания, чтобы улучшить зрение. В зависимости от настроек хоста вы можете получать небольшое улучшение зрения при каждом выполненном задании или большое улучшение после выполнения всех заданий.
      Blurb: Выполняй задания для улучшения зрения
      Options:
        SlowlyGainsVision: Постепенно улучшает зрение
        VisionGain: Улучшение зрения при выполнении задания
        OverrideVision: Переопределить начальное зрение
        StartingVision: Начальный модификатор зрения
        FinalVision: Зрение после выполнения всех заданий
        LightsImmunity: Иммунитет к отключению света при выполненных заданиях
    Oracle:
      RoleName: Оракул
      Description: Оракул может проголосовать за игрока на собрании, чтобы выбрать цель (это не считается голосом). После смерти Оракула роль цели раскрывается для всех.\n\nОракул может пропустить голос перед выбором цели или сначала зафиксировать цель, а затем голосовать или пропускать свободно. Оракул может раскрыть свою собственную роль, проголосовав за себя.
      Blurb: Раскрывай роль после смерти
      SelectRole: 'Вы выбрали: {0}'
      UnselectRole: 'Вы сняли выбор: {0}'
      VotePlayerInfo: Проголосуйте, чтобы выбрать игрока для раскрытия при вашей смерти. Повторный голос снимает выбор.\n\nПосле подтверждения цель изменить нельзя.
      OracleMessageTitle: Способность Оракула
      VoteNormallyMessage: Теперь вы можете голосовать обычным образом
      SkipMessage: Проголосуйте ещё раз для подтверждения выбора.
      RevealMessage: Оракул раскрыл всем, что {0} является {1}
    Psychic:
      RoleName: Экстрасенс
      Description: Экстрасенс обладает способностью видеть потенциальных злодеев на собрании.\n\nИмена нескольких игроков будут выделены красным, как минимум один из них злой. Количество выделенных игроков может быть изменено хостом.
      Blurb: Видь потенциальных злодеев
      Options:
        MaxHighlightedPlayers: Максимум выделенных игроков
        AllKillingRolesAreEvil: Все убивающие::0 роли считаются злыми
    Repairman:
      RoleName: Ремонтник
      Description: Ремонтник может быстро исправлять саботажи, которые обычно требуют двух игроков (например, реактор), в одиночку.\n\nСвет можно исправить, коснувшись одного рычага. Открытие двери, которую можно открыть вручную (например, на Полюсе), откроет все связанные двери.
      Blurb: Быстро исправляй саботажи
      Options:
        RepairmanCanVent: Ремонтник::0 может использовать вентиляцию
        FastFixLights: Быстро исправляет свет
        FastFixReactor: Быстро исправляет реактор
        FastFixOxygen: Быстро исправляет кислород
        FastFixComms: Быстро исправляет связь
        FastFixDoors: Быстро исправляет двери
        FastFixHelicopter: Быстро исправляет Экспресс-крушение
      RepairmanFixMessage: '{0} исправил {1}.'
    Scientist:
      RoleName: Учёный
      Description: У Учёного есть портативный монитор пульсов, доступный в любом месте карты. Это обычная роль Among Us.
      Blurb: Следи за пульсами в любое время
      Options:
        VitalsCooldown: Откат пульсов
        VitalsBatteryCharge: Заряд батареи пульсов
    Sheriff:
      RoleName: Шериф
      Description: >-
        Шериф может убивать Предателей и Нейтралов. Осторожно! Шериф промахнётся (убьёт себя), если попытается застрелить Члена экипажа или Нейтрала, не разрешённого хостом.

        Примечание: Если «Кнопка действия» Шерифа установлена на «Убийство», Шериф не получит заданий.
      Blurb: Стреляй в Предателей
      MisfireStat: Промахи
      NeutralKillingSetting: Может убивать нейтральных::0 убийц::1
      NeutralPassiveSetting: Может убивать нейтральных::0 пассивных::1
      MadmateSetting: Может убивать безумцев::0
      Options:
        SheriffActionButton: Кнопка действия Шерифа
        OneShotPerRound: Один выстрел за раунд
        KillOnMisfire: Убивать цель при промахе
        KillCooldown: Откат выстрела
        TotalShots: Всего выстрелов
        ActionKillButton: Кнопка убийства (устаревшая)
        ActionPetButton: Кнопка питомца
    Snitch:
      RoleName: Стукач
      Description: Стукач — Член экипажа, который должен выполнить свои задания, чтобы узнать, кто является Предателями (также может видеть нейтральных убийц в зависимости от настроек).\n\nКогда у Стукача осталось определённое количество заданий, он будет раскрыт убийцам с индикатором ⚠.\n\nВ зависимости от настроек и момента выполнения заданий Стукач также может видеть стрелки в направлении отслеживаемых игроков и наоборот.
      Blurb: Выполни задания, чтобы видеть убийц
      Options:
        RemainingTaskWarning: Предупреждение об оставшихся заданиях
        EvilArrowToSnitch: Злые имеют стрелку к Стукачу::0
        SnitchArrow: Включить стрелку для Стукача::0
        ColoredArrow: Цветная стрелка
        SnitchTracksAllKillers: Стукач::0 может отслеживать любых убийц
    Speedrunner:
      RoleName: Бегун на скорость
      Description: Бегун на скорость должен выполнять задания, чтобы увеличить скорость.\n\nВ зависимости от настроек хоста вы можете получать небольшое (возможно, временное) ускорение после выполнения отдельных заданий или большое ускорение после достижения порога заданий.
      Blurb: Выполняй задания для увеличения скорости
      Options:
        TempBoostOnTaskFinish: Временное ускорение при выполнении задания
        TempBoostDuration: Длительность временного ускорения
        PermanentSpeedGain: Постоянное увеличение скорости за задание
        TaskUntilLargeSpeedBoost: Оставшихся заданий до финального ускорения
        FinalSpeedBoost: Финальная скорость
    Swapper:
      RoleName: Обменник
      Description: Первые два игрока, за которых вы голосуете на каждом собрании, поменяются количеством голосов против них.\n\nПосле голосования за этих игроков вы можете голосовать обычным образом. Также вы можете пропустить голос в начале и перейти к обычному голосованию.\n\nПосле выбора одного игрока для обмена вы можете повторно проголосовать за него для отмены. После выбора двух игроков для обмена изменить выборы нельзя.
      Blurb: Меняй голоса игроков
      SwapperInfoMessage: >-
        Вы — Обменник. Чтобы поменять голоса двух игроков, проголосуйте за двух разных игроков.

        Вы можете изменить первого обмениваемого, повторно проголосовав за него.

        Также вы можете обойти эту способность, изначально пропустив голос.
      SwapperSelectMessage1: Вы выбрали поменять голоса {0}.
      SwapperSelectMessage2: Вы выбрали поменять голоса {0}. {1} и {0} поменяются голосами против них.
      SwapperUnselectMessage: Вы сняли выбор {0}.
      SwapperPublicMessage: Обменник поменял голоса {0} и {1}!
      SwapperAbility: Способность Обменника
      Options:
        SwapsPerGame: Обменов::0 за игру
    Tracker:
      RoleName: Следопыт
      Description: Следопыт может использовать кнопку отслеживания на игроке, чтобы отметить его местоположение и отслеживать передвижения на карте.\n\nТакже Следопыт может использовать кнопку питомца, чтобы показать стрелки в направлении любых трупов на карте, если это включено хостом.
      Blurb: Отслеживай других игроков
      Options:
        TrackerCooldown: Откат следопыта
        TrackerDuration: Длительность отслеживания
        TrackerDelay: Задержка обновления следопыта
    Transporter:
      RoleName: Транспортёр
      Description: Транспортёр может использовать кнопку питомца, чтобы заставить двух случайных игроков поменяться местами.
      Blurb: Транспортируй игроков
      Options:
        TotalTransports: Количество транспортировок
        TransportCooldown: Откат транспортировки
      ButtonText: Транспортировать
    Trapster:
      RoleName: Ловушечник
      Description: Когда Ловушечника убивают, убийца замирает на месте на установленное время.\n\nЗамороженный убийца не сможет сообщить о трупе, пока находится в ловушке.
      Blurb: Замораживай Предателей при убийстве
      Options:
        TrapsOnIndirectKills: Ловушка при косвенных убийствах
        TrappedDuration: Длительность заморозки
        BlockReportWhileTrapped: Блокировать сообщение о трупе во время заморозки
    Veteran:
      RoleName: Ветеран
      Description: Ветеран может использовать кнопку питомца, чтобы перейти в режим «Боевой готовности».\n\nКогда игрок взаимодействует с Ветераном в режиме боевой готовности, атака отражается и атакующий погибает.
      Blurb: Убивай других в целях самозащиты.
      Options:
        TotalAlerts: Количество боевых готовностей
        AlertCooldown: Откат боевой готовности
        AlertDuration: Длительность боевой готовности
        KillCrewmates: Убивать членов экипажа
        KillWhileTransported: Убивать при транспортировке
        KillRangedAttackers: Убивать атакующих с дальнего расстояния
      ButtonText: Боевая готовность
    Vigilante:
      RoleName: Линчеватель
      Blurb: Угадывай роли Предателей, чтобы убивать
      Description: >-
        Линчеватель — Член экипажа, который может убивать Предателей и Нейтралов, угадывая роли игроков. Нельзя угадывать роли Членов экипажа.

        Во время собрания можно выбрать игрока, проголосовав за него. После голосования Линчеватель может использовать команду чата (/cmd [название роли]),
        чтобы выбрать роль для угадывания.

        Чтобы завершить угадывание, проголосуйте за игрока ещё раз для подтверждения. Если угадывание верное — игрок умирает, иначе умирает Линчеватель.

        Чтобы отменить угадывание, пропустите голос в любой момент — следующий голос будет обычным.

        Примечание: Раскрытые роли (например, от Оракула) угадать нельзя.
      SelectPlayer: 'Вы выбрали убить:'
      SelectRole: 'Вы угадываете:'
      SkipToContinue: Нажмите «Пропустить голос», чтобы продолжить.
      VoteRoleInfo: Чтобы выбрать роль, проголосуйте за игрока с ролью над именем. Если над именем несколько ролей, повторное голосование за этого игрока выберет следующую отображаемую роль.
    AgiTater:
      RoleName: Агитатор
      Description: >-
        Агитатор может начать смертоносную игру в «горячую картошку».

        Используйте кнопку убийства, чтобы передать бомбу игроку, который должен передать её другому игроку до взрыва (может быть после истечения времени или при следующем собрании).

        Игроки, держащие бомбу, могут передать её, подойдя к другому игроку, и у держащего появится текст «Держит бомбу!».

        Примечание: Если бомба настроена на взрыв по времени, текст индикатора будет менять цвет с зелёного на жёлтый и красный по мере приближения взрыва.
      Blurb: Передавай бомбу (горячая картошка)
      Options:
        PlaceBombCooldown: Откат закладки бомбы
        ExplodeOnMeetings: Взрываться на собраниях
        ExplodeAfterDuration: Взрываться по истечении времени
        ExplodeDoubleBombed: Взрываться при двойном бомбировании
        BombDuration: Длительность бомбы
        BombsPerRound: Бомб за раунд
        BombTransferRate: Скорость передачи бомбы
      PassTheBombText: Передай бомбу
      HoldingBombLevel1: Держит бомбу!
      HoldingBombLevel2: Держит бомбу!!!
      HoldingBombLevel3: Держит бомбу!!!!!
      ButtonText: Передать
    Amalgamation:
      RoleName: Амальгамация
      Description: Каждый раз, когда Амальгамация сообщает о трупе, она приобретает способности этой роли. Условие победы Амальгамации определяется первым трупом, о котором она сообщила, остальные трупы продолжают усиливать Амальгамацию. Амальгамация — скрытая роль, которая иногда появляется вместо Амнезиака.
      Blurb: Становись ВСЕМИ ролями
      Options:
        WinConditionDeterminer: Определитель условия победы
        OldestRoleValue: Старейшая роль
        NewestRoleValue: Новейшая роль
        MaxAbsorbedRoles: Максимум поглощённых ролей
        AbsorbModifiers: Поглощать модификаторы
    Amnesiac:
      RoleName: Амнезиак
      Description: >-
        Когда Амнезиак впервые сообщает о трупе, он присоединяется к команде мёртвого игрока. Если включено, Амнезиак вместо этого крадёт точную роль игрока.

        Если Амнезиак сообщает --> то он становится:

        Нейтральным убийцей --> Наёмником

        Нейтральным пассивным --> Оппортунистом

        Членом экипажа --> Шерифом

        Другим --> Шутом
      Blurb: Сообщи о трупе и присоединись к его команде
      Options:
        StealsExactRole: Крадёт точную роль
        HasArrowsToBody: Стрелки к трупам
      ButtonText: Вспомнить
    Archangel:
      RoleName: Архангел
      Description: Архангел получает цель в начале игры в виде текстового индикатора под именем. Он может использовать кнопку питомца для временной защиты цели от определённых типов взаимодействий в зависимости от настроек хоста.\n\nАрхангел побеждает, если его цель побеждает (даже если Архангел мёртв).\n\nЕсли цель умирает, Архангел может сменить роль (в зависимости от настроек хоста) или сохранить свою роль и всё равно победить, если команда цели победит (например, Член экипажа как цель может победить вместе с Членами экипажа, даже будучи мёртвым).
      Blurb: Защищай свою цель от смерти
      Options:
        ProtectDuration: Длительность защиты
        ProtectCooldown: Откат защиты
        TargetKnowsArchAngelExists: Цель знает, что у неё есть Архангел
        ArchAngelKnowsTargetRole: Архангел знает роль цели
        RoleChangeWhenTargetDies: Смена роли при смерти цели
        ShouldCancelWhichInteractions: Защищать от каких взаимодействий
        InteractionFormatter: Отменять {0} взаимодействия
        Indirect: Косвенные
        Ranged: Дальние
        Delayed: Отложенные
        Neutral: Нейтральные
        Fatal: Смертельные
        Hostile: Враждебные
      ButtonText: Защитить
    Arsonist:
      RoleName: Поджигатель
      Description: Нажимайте кнопку убийства рядом с игроком, чтобы облить его маслом. Игрок полностью облит, когда отмечен полным оранжевым кругом.\n\nОблейте всех игроков и подожгите их кнопкой питомца, чтобы победить.
      Blurb: Обливай и поджигай всех игроков для победы
      Options:
        AttacksToCompleteDouse: Атак для завершения обливания
        CanIgniteAnytime: Можно поджигать в любое время
        DouseCooldown: Откат обливания
        IgniteCooldown: Откат поджигания
        ShareSameCooldown: Нельзя обливать/поджигать, пока другое на откате
      IncineratedDeathName: Сожжён
      DouseEventMessage: '{0} облил {1}.'
      PressIgniteToWinMessage: Нажми «Поджечь», чтобы победить
      DousedPlayerStatistic: Облитые игроки
      IncineratedPlayerStatistic: Сожжённые игроки
      ButtonText: Облить
      IgniteButtonText: Поджечь
    BloodKnight:
      RoleName: Кровавый рыцарь
      Description: Кровавый рыцарь — нейтральный убийца, у которого каждый раз при убийстве игрока появляется защита от атак на несколько секунд.
      Blurb: Получай щит за каждое убийство
      Options:
        ProtectDuration: Длительность защиты
    Child:
      Blurb: Дай себя убить, чтобы мгновенно победить
      Description: >-
        Это роль первого апреля. Она будет появляться в настройках и спауниться только с 1 по 7 апреля.\nРебёнок — роль Члена экипажа, который мгновенно и в одиночку побеждает, когда его убивают <b>в течение раунда</b>. Если Ребёнка убивают на собрании (например, угадыванием), победа не засчитывается.
      EarDamageReason: Повреждение слуха
      RoleName: Ребёнок
      ScreamedDeathReason: Закричал
    Copycat:
      RoleName: Подражатель
      Description: Как Подражатель, в первый раз, когда вас атакуют, вы смените фракцию и роль. Если вас атаковал Предатель, вы теперь Предатель. Если одиночный убийца — вы тоже одиночный убийца. В зависимости от настроек хоста вы можете также унаследовать их «прогресс».
      Blurb: Стань напарником своего убийцы
      Options:
        KillerKnowsCopycat: Убийца знает о Подражателе::0
        CopyRoleProgress: Копировать прогресс роли
      CopyCatFactionChangeName: '{0}кот'
    Deathknight:
      RoleName: Рыцарь смерти
      Description: Рыцарь смерти — вторичная роль Некроманта, который должен помогать ему превращать игроков в Нежить.\nРыцарь смерти должен начать превращение кнопкой питомца на игроке, после чего Некромант должен завершить превращение кнопкой убийства того же игрока. Статус превращения можно отслеживать по кругу рядом с именем.\nОдновременно может быть только один Рыцарь смерти, и если Некромант погибает, Рыцарь смерти становится новым Некромантом.\n\nРыцарь смерти назначается первому игроку, которого превращает Некромант.
      Blurb: Помогай превращать роли в Нежить
      Options:
        CanBecomeNecromancer: Может стать Некромантом
        InfluenceCooldown: Откат влияния
        InfluenceRange: Радиус влияния
        InfluenceMany: Влиять на многих
      ButtonText: Превратить
    Demon:
      RoleName: Демон
      Description: Когда в игре есть Демон, все игроки появляются с зелёной полоской здоровья над головой (видимой только Демону).\n\nКогда Демон атакует игрока, его полоска здоровья уменьшается. После полного истощения полоски здоровья игрок умирает.\n\nКогда Демона атакуют, его полоска здоровья тоже уменьшается. Демон может немного исцелиться, убивая игроков.
      Blurb: Атакуй игроков, чтобы истощить их здоровье
      Options:
        AttackCooldown: Откат атаки
        DamagePerAttack: Урон за атаку
        HealthHealedOnKill: Восстановление здоровья при убийстве
        DamageTakenOnAttack: Получаемый урон за атаку
      ButtonText: Атаковать
    Egoist:
      RoleName: Эгоист
      Description: Эгоист — нейтральный убийца, который может видеть, кто является Предателями, но не может их убивать.\n\nЕго задача — предать Предателей и попытаться вывести их из игры голосованием, одновременно убивая других игроков для одиночной победы. Предатели могут убивать, но не знают, что среди них есть Эгоист.
      Blurb: Убивай всех и выводи Предателей
      Options:
        IsShapeshifter: Эгоист является Оборотнем
    Executioner:
      RoleName: Палач
      Description: Палач получает цель в начале игры. Цель отмечена цветным именем (того же цвета, что и Палач), и Палач победит, если его цель будет изгнана голосованием.\n\nЕсли цель умирает до изгнания, Палач меняет роль и становится Членом экипажа, Шутом или Оппортунистом согласно настройкам хоста. Если цель — Шут, Палач может стать дополнительным победителем.
      Blurb: Сделай так, чтобы цель была изгнана
      Options:
        TargetImpostors: Может выбирать Предателей в цели
        TargetNeutrals: Может выбирать Нейтралов в цели
        RoleChange: Смена роли при смерти цели
    Glitch:
      RoleName: Глитч
      Description: Используйте кнопку убийства для блокировки роли или убийства игроков. Кнопку питомца можно использовать для переключения между взломом (блокировкой роли) и убийством.\n\nВзлом игрока не позволяет ему убивать, сообщать о трупах, вызывать собрания, морфаться и использовать вентиляцию.
      Blurb: Блокируй роли и убивай игроков
      ModeHacking: Взлом
      ModeKilling: Убийство
      Glitch:
        Options:
          HackingDuration: Длительность взлома

    Hacker:
      RoleName: Хакер
      Description: Хакер должен исправлять саботажи, чтобы зарабатывать очки. Каждое исправление саботажа равно одному очку, и Хакеру нужно определённое количество очков (задаётся хостом) для победы. Как и Ремонтник, Хакер может исправлять саботажи быстрее и в одиночку.
      Blurb: Исправляй саботажи для победы
      Options:
        HackerSabotagePointAmount: Очков для победы
        FixingDoorsGivesPoints: Починка дверей даёт очки
        HackerCanVent: Хакер::0 может использовать вентиляцию
    Harbinger:
      RoleName: Предвестник
      Options:
        TasksPerRitualCircle: Заданий на ритуальный круг
        RitualCirclesUntilWin: Ритуальных кругов до победы
      Blurb: <Roles.Harbinger.Blurb>
    Hitman:
      RoleName: Наёмник
      Description: Оставайся в живых! Наёмник — нейтральный убийца, который может победить с большинством команд, пока жив до конца игры.\n\nХост может выбрать, побеждает ли Наёмник вместе с Палачом/Шутом.
      Blurb: Убивай игроков и оставайся в живых
      Options:
        WinWithAbsolutes: Побеждает с абсолютными победителями
        Executioner: Палач
        Jester: Шут
    Jackal:
      RoleName: Шакал
      Description: Шакал может убивать всех, включая Предателей. Он должен быть последним выжившим игроком, чтобы победить.
      Blurb: Убивай всех
      Options:
        CanRecruit: Может вербовать
        OnNonCrewRecruit: При вербовке не-Члена экипажа
        KillsUntilRecruit: Убийств до вербовки
        SidekickBecomesJackal: Помощник становится Шакалом после смерти Шакала
        NewJackalCanRecruit: Новый Шакал может вербовать
      NextKillIsRecruit: >-
        <size=1.5>У вас достаточно убийств для вербовки.

        Следующее убийство завербует игрока.</size>
      Recruit: Завербовать
    Jester:
      RoleName: Шут
      Description: Шут должен быть изгнан, чтобы победить. Если Шут изгнан, игра немедленно заканчивается его победой.\n\nВ зависимости от настроек хоста Шут может не иметь возможности вызывать собрания или может нуждаться в минимальном количестве собраний перед возможностью победы.
      Blurb: Добейся изгнания
      Options:
        ImpostorVision: Имеет зрение Предателя
        CanUseVents: Может использовать вентиляцию
        CantCallEmergencyMeetings: Не может вызывать экстренные собрания
        MeetingsBeforeWinning: Минимум собраний перед возможностью победы
      WinConditionName: Шут::0 изгнан
    Juggernaut:
      RoleName: Джаггернаут
      Description: Джаггернаут начинает с более высоким откатом убийства, но с каждым убийством откат уменьшается.\n\nОн должен убить всех, включая Предателей, и быть последним оставшимся в живых.
      Blurb: Убивай всех и будь последним выжившим
      Options:
        CooldownReductionPerKill: Снижение отката за убийство
    Marksman:
      RoleName: Стрелок
      Description: Стрелок может убивать игроков, чтобы увеличить дальность убийства. Количество убийств для увеличения дальности задаётся хостом.
      Blurb: Совершай убийства для увеличения дальности
      Options:
        KillsBeforeIncrease: Убийств до увеличения дальности
        StartingKillDistance: Начальная дальность убийства
    Necromancer:
      RoleName: Некромант
      Description: Некромант — главный вербовщик фракции Нежити. Первый завербованный (использование кнопки убийства) становится Рыцарем смерти. С помощью Рыцаря смерти они должны работать вместе для превращения других в Нежить. Некромант может превращать людей, используя кнопку убийства на ком-то, кого Рыцарь смерти уже начал превращать.\n\nУ превращённых/частично превращённых игроков будет круг рядом с именем. Полный круг означает полное превращение. Если вы попытаетесь превратить игрока, которого Рыцарь смерти ещё не начал превращать, вы будете заблокированы.
      Blurb: Превращай роли в Нежить
      Options:
        ConvertCooldown: Откат превращения
        PartialConvertImmunity: Иммунитет к частично превращённым
      ButtonText: Превратить
    Occultist:
      RoleName: Оккультист
      Description: Кнопка убийства/заклинания Оккультиста чередует между наложением заклинания и убийством игроков.\n\nИгроки, заколдованные Оккультистом, будут видны с крестом на собрании. Если Оккультист не будет изгнан в ходе этого собрания, заколдованный игрок умрёт.\n\nОбычное убийство автоматически сообщает о Приманке.\nЗаклинание не сообщает о Приманке.
      Blurb: Заклинай и убивай игроков
      Options:
        FreelySwitchModes: Свободно переключать режимы
        SwitchModesAfterAttack: Переключать режимы после атаки
      CursedMessage: '{0}::0 заколдовал {1}::1, чтобы тот умер в конце следующего собрания.'
      CursingModeText: Заклинание
      KillingModeText: Убийство
      HexedCauseOfDeath: Заколдован
      CursedStatusDescription: Вас заколдовали. Заколдованные игроки умрут после собрания, если источник заклинания не будет изгнан.
    Opportunist:
      RoleName: Оппортунист
      Description: Независимо от исхода игры, Оппортунист побеждает, если выживет до конца матча.
      Blurb: Оставайся в живых до конца игры
    Pelican:
      RoleName: Пеликан
      Description: Пеликан проглатывает игроков кнопкой убийства. Проглоченные игроки телепортируются за пределы карты и не могут взаимодействовать с игрой (включая саботажи).\n\nКогда вызывается собрание, все проглоченные игроки мгновенно умирают. Если Пеликан умирает или отключается, все проглоченные игроки возвращаются туда, где Пеликан находился последний раз.
      Blurb: Проглатывай игроков
      Options:
        GulpCooldown: Откат проглатывания
        AllowEscapeFromPelican: Разрешить побег от Пеликана
        SpawnBodiesOnPelican: Спаунить трупы на Пеликане при собрании
      GulpedStatistic: Проглочено игроков
      DeathName: Проглочен
      ButtonText: Проглотить
    Pestilence:
      RoleName: Чума
      Description: Чума — вторичная роль Носителя чумы после заражения всех. Чума не может быть убита напрямую, и любой, кто взаимодействует с ней, будет отражён (убит вместо неё).\n\nЧуму можно изгнать или убить косвенно (например, Проклятыми или Марионетированными игроками).\n\nВ зависимости от настроек хоста другие типы атак также могут убивать Чуму, а атаки Чумы могут быть непреодолимыми.
      Blurb: Убивай всех и побеждай в одиночку
      Options:
        UnblockableKill: Непреодолимое убийство
        InvincibilitySettings: Настройки неуязвимости
        ImmuneManipulatorAttackers: Иммунитет к атакующим под манипуляцией
        ImmuneRangedAttacks: Иммунитет к дальним атакам
        ImmuneDelayedAttacks: Иммунитет к отложенным атакам
        ImmuneArsonistIgnite: Иммунитет к поджиганию Поджигателя
      ButtonText: Убить
    Pirate:
      RoleName: Пират
      Description: >-
        Пират — нейтральный угадыватель, который может убивать игроков, угадывая их роли. Если Пирату удаётся правильно угадать роль игрока, этот игрок будет устранён.

        Во время собрания можно выбрать игрока, проголосовав за него. После голосования можно использовать команду чата (/cmd [название роли]),
        чтобы выбрать роль для угадывания.

        Чтобы завершить угадывание, проголосуйте за игрока ещё раз для подтверждения. Если угадывание верное — игрок умирает, иначе умирает Пират.

        Пирату нужно определённое количество успешных угадываний для победы, задаётся хостом. В зависимости от настроек хоста Пират может не умирать при промахе, но не сможет угадывать снова до конца раунда.

        Чтобы отменить угадывание, пропустите голос в любой момент — следующий голос будет обычным.

        Примечание: Раскрытые роли (например, от Оракула) угадать нельзя.
      Blurb: Угадывай роли игроков
      Options:
        GuessWinAmount: Количество угадываний для победы Пирата
        DieOnMisguess: Пират умирает при промахе
    PlagueBearer:
      RoleName: Носитель чумы
      Description: Используйте кнопку убийства для заражения всех. После заражения всех Носитель чумы превращается в Чуму.
      Blurb: Заражай всех и стань Чумой
      Options:
        InfectCooldown: Откат заражения
      InfectedHistoryMessage: '{0}::0 заразил {1}::1.'
      ButtonText: Заразить
    Postman:
      RoleName: Почтальон
      Description: Почтальон должен доставлять письма другим игрокам. Выполняйте задания, чтобы получить целевого игрока для доставки почты (могут быть стрелки, указывающие на цель, если включено).\n\nПосле получения цели (обозначена чёрным именем) Почтальон должен доставить письмо (прикоснуться к цели). Выполните ещё одно задание для получения новой цели, но если сделать это без доставки письма первой цели, Почтальон совершит самоубийство.\n\nПосле доставки писем всем живым игрокам на следующем собрании будет отправлено сообщение с уведомлением о необходимости изгнать Почтальона. Если Почтальон не будет изгнан в ходе этого собрания, он победит и игра завершится.
      Blurb: Доставь все письма для победы
      Announcement: Почтальон завершил все свои доставки. Изгоните его, иначе он победит.
      Postman:
        Options:
          ArrowsToTargets: Стрелки к целям
          TargetDies: При смерти цели
    Retributionist:
      RoleName: Мститель
      Description: Мститель — нейтральный убийца, обладающий способностью мстить за себя.\n\nЕсли другой игрок пытается убить Мстителя, убийство блокируется, и Мститель телепортируется к случайной вентиляции. У Мстителя затем будет определённое время, чтобы найти своего убийцу (отмечен оранжевым именем) и убить его.\n\nЕсли он убивает вовремя, Мститель выживет, иначе умрёт.
      Blurb: Получи ещё один шанс на жизнь
      Options:
        RevengeTimeLimit: Лимит времени на месть
        InvisibleRevenge: Невидимость во время мести
        TotalRevengeAmount: Количество местей
    SchrodingersCat:
      RoleName: Кот Шрёдингера
      Description: Кот Шрёдингера меняет команды каждый раз, когда кто-то пытается его убить. У него максимальное количество жизней, и он будет продолжать менять команды до исчерпания жизней или конца игры.\n\nНазвание роли Кота Шрёдингера будет меняться, отражая текущую команду. Его задача — помогать этой команде побеждать, защищая её в игре или снимая подозрения с товарища по команде.\n\nКот Шрёдингера победит вместе с той командой, в которой он находится в конце игры. Например, если Шакал убьёт Кота Шрёдингера, название роли изменится на «Шакалкот», и Кот Шрёдингера победит вместе с Шакалом (при условии, что он останется «Шакалкотом» до конца игры).\n\nВ отличие от Подражателя, Кот Шрёдингера не может убивать.
      Blurb: Меняй команды с каждой попыткой на свою жизнь
      Aliases: Schrodingers Cat, SC, SCat, S Cat, SchrodingersCat, Schrodinger's Cat
      CopycatFactionChangeName: '{0}кот'
      CatFactionChangeName: '{0}кот'
      Options:
        NumberOfLives: Количество жизней
        KillerKnowsCat: Убийца знает о коте Шрёдингера::0 Кот::1
    Sidekick:
      RoleName: Помощник
      Blurb: Помогай Шакалу убивать всех
      Description: Шакал может завербовать игрока в Помощники, если соответствующая настройка включена. Помощник потеряет свою прежнюю роль и способности, но станет союзником Шакала и получит возможность убивать. Помощник не сможет использовать вентиляцию или устраивать саботажи, как Шакал. Если Шакал умирает, Помощник может быть повышен при включённой настройке, и вы можете завербовать ещё одного помощника.
    Survivor:
      RoleName: Выживший
      Description: Выживи до конца игры, чтобы победить.\n\nВыживший может использовать кнопку питомца для защиты от атак на короткое время. Выживший не может побеждать вместе с Палачом или Шутом.
      Blurb: Выживи до конца, чтобы победить
      Options:
        VestDuration: Длительность щита
        VestCooldown: Откат щита
        TotalShields: Количество щитов
      ButtonText: Щит
    Taskrunner:
      RoleName: Бегун заданий
      Description: Бегун заданий должен выполнить все свои задания для победы. Он не может умереть, пока не будет выполнено установленное количество заданий (согласно настройкам хоста).\n\nКогда Бегун заданий близок к завершению всех заданий, все получают стрелку, направленную прямо к нему, и рядом с именем Бегуна появляется индикатор «⚠».\n\nУбейте Бегуна заданий до завершения всех заданий, чтобы остановить его. Бегуна заданий нельзя изгнать голосованием — его можно только убить.
      Blurb: Выполняй задания для одиночной победы
      Options:
        ImmuneToRangedInteractions: Иммунитет к дальним взаимодействиям
        RemainingTaskWarning: Предупреждение об оставшихся заданиях
        RemainingTaskTargetable: Оставшиеся задания для возможности атаки
    Terrorist:
      RoleName: Террорист
      Description: Выполни все задания и позволь себя убить, чтобы победить. Террорист также может быть изгнан для победы в зависимости от настроек хоста.
      Blurb: Выполни все задания, затем умри для победы
      Options:
        CanWinBySuicide: Может победить самоубийством
        CanWinByExiled: Может победить изгнанием
    Turncoat:
      Options:
        RevealedTurncoatWincon: 'Условие победы раскрытого Перебежчика:'
        RevealedTurncoatAllies: Раскрытый Перебежчик узнаёт союзников
        TurncoatLearns: Перебежчик узнаёт когда
        MustBeAlive: Перебежчик должен быть жив для победы
        AfterReveal: После раскрытия
        BeforeReveal: До раскрытия
        ImpFaction: Предатель
        NeutralFaction: НК / Нежить
        NonCrewFaction: Не-экипаж
        Immediately: Немедленно
        NextMeeting: На следующем собрании
      NoTarget: Нельзя раскрываться до выбора цели кнопкой убийства.
      BetrayReveal: >-
        {0} является {1} и выбрал предать экипаж!

        Однако {1} проклял кого-то! Если {1} умрёт, он заберёт проклятого игрока с собой.
      TurncoatHint: Проголосуйте за себя, чтобы предать экипаж. Но помните, это раскроет вашу личность остальным членам экипажа.
      BetrayedTeamPlayers: "Вы перешли на сторону фракции '{0}'. Эти игроки в одной команде: {1}"
      NoPlayersOnBetrayedTeam: Нет игроков в команде, на сторону которой вы перешли.
      RoleName: Перебежчик
      Blurb: Предай экипаж... или нет
      Description: Перебежчик — нейтральная роль, изначально на стороне Членов экипажа. В конце игры они побеждают вместе с экипажем. Однако они могут предать экипаж, проголосовав за себя на собрании. В результате их роль будет раскрыта всем. Чтобы помешать экипажу сразу изгнать Перебежчика, можно отметить игрока кнопкой убийства перед раскрытием. Этот игрок умрёт, если вы умрёте, поэтому его можно использовать как рычаг давления для сохранения жизни. Игрок не знает, что является жертвой, поэтому можно лгать и обвинять кого угодно (например, Доктора).
    Vulture:
      RoleName: Гриф
      Description: Используйте кнопку сообщения, чтобы поедать трупы и делать их необнаруживаемыми. Гриф может переключаться между поеданием трупов и их обнаружением кнопкой питомца.\n\nГриф победит, когда съест установленное количество трупов, и может иметь стрелку, указывающую на трупы, если это включено хостом.
      Blurb: Ешь трупы
      EatingModeText: Пиршество
      ReportingModeText: Обнаружение
      Options:
        RequiredBodies: Необходимо трупов
        HasImpostorVision: Зрение Предателя
        SwitchModes: Переключение между поеданием и обнаружением
        CanUseVent: Может использовать вентиляцию
        HasArrowsToBody: Стрелки к трупам
      EatButtonText: Пожрать
      ReportButtonText: Обнаружить
    Werewolf:
      RoleName: Волк
      Description: Волк — нейтральный убийца, который может нажать кнопку питомца, чтобы начать буйство и убивать с уменьшенным откатом убийства.\n\nВолк может убивать только во время буйства.
      Blurb: Буйствуй и убивай всех
      Rampage: Убивай всех
      Options:
        RampageKillCooldown: Откат убийства во время буйства
        RampageCooldown: Откат буйства
        RampageDuration: Длительность буйства
        CanVentNormally: Может использовать вентиляцию обычно
        CanVentInRampage: Может использовать вентиляцию во время буйства
      PetButtonText: Буйство
      KillButtonText: Растерзать
    GM:
      RoleName: Мастер игры
      Blurb: Ты — Мастер игры
      Description: «Мастер» игры (он же хост). Когда хост является Мастером игры, он не считается игроком и «умирает» сразу при появлении в игре. Это позволяет ему наблюдать за всеми игроками, чтобы убедиться, что игра проходит правильно (или просто отдыхать).
    Bait:
      RoleName: Байт
      Description: Когда убивают Байта, её убийца автоматически сообщает о себе.
      Blurb: Вынужденное самодоносительство при смерти
      Options:
        AnnounceBait: Объявлять Байта на первом собрании
      BaitAnnounceMessage: '{0} является Байтом! Когда её убьют, убийца автоматически сообщит о её трупе.'
    Bewilder:
      RoleName: Смутьян
      Description: Когда кого-то с модификатором Смутьян убивают, они заставляют своего убийцу иметь значительно сокращённое расстояние обзора на оставшуюся часть игры.
      Blurb: Уменьшай зрение убийцы при смерти
      BewilderedStatus: Ошеломлён
      BewilderedDescription: Статус «Ошеломлён» уменьшает ваше зрение на определённый множитель.
      Options:
        VisionMultiplier: Множитель зрения
    Deadly:
      RoleName: Смертоносный
      Blurb: Уменьшай откат убийства
      Description: Игроки с модификатором Смертоносный имеют уменьшенный откат убийства на заданный процент.
      Options:
        CooldownReduction: Уменьшение отката
        AssignableToNonKilling: Назначается неубивающим ролям
    Diseased:
      RoleName: Заражённый
      Description: Умножает откат убийства убийцы при смерти
      Blurb: Увеличивай откат убийства убийцы
      Options:
      CooldownIncrease: Увеличение отката
      DiseasedAffectDescription: У вас есть статус «Заражённый». Это означает, что ваш откат убийства увеличен на определённый процент.
    Drunk:
      RoleName: Пьяный
      Blurb: Инвертирует управление
      Description: >-
        Это роль первого апреля. Она будет появляться в настройках и спауниться только с 1 по 7 апреля.\nЭта подроль инвертирует управление игрока, пока он жив. Вверх идёт вниз, а влево — вправо.

    Escalation:
      RoleName: Эскалация
      Blurb: Получай скорость за убийства
      Description: Игроки с модификатором Эскалация получают постоянное ускорение за каждое убийство.
      Options:
        SpeedGainPerKill: Дополнительная скорость за каждую смерть игрока
    Flash:
      RoleName: Молния
      Description: Молния заставляет игрока двигаться быстрее других игроков.
      Blurb: Увеличивает скорость
      Options:
        SpeedIncrease: Увеличение скорости
    Guesser:
      RoleName: Угадыватель
      Description: >-
        Даёт любой роли способность угадывать. Угадыватели могут угадывать роли игроков для их устранения.

        Во время собрания Угадыватель может выбрать игрока для угадывания, проголосовав за него. После голосования Угадыватель может использовать команду чата (/cmd [название роли]),
        чтобы выбрать роль для угадывания.

        Чтобы завершить угадывание, проголосуйте за игрока ещё раз для подтверждения. Если угадывание верное — игрок умирает, иначе Угадыватель умирает.

        Чтобы отменить угадывание, пропустите голос в любой момент — следующий голос будет обычным.

        Примечание: Раскрытые роли (например, от Оракула) угадать нельзя.
      Blurb: Угадывай роли игроков
      Options:
        GuesserPerMeeting: Угадываний за собрание
        CanGuessTeammates: Может угадывать товарищей по команде
        FactionMaxGuessers: 'Максимум Угадывателей::0 от фракции {0}'
        NeutralKillingSetting: Может угадывать нейтральных::0 убийц::1
        NeutralPassiveSetting: Может угадывать нейтральных::0 пассивных::1
        ImpostorSetting: Может угадывать Предателей::0
        CrewmateSetting: Может угадывать Членов экипажа::0
        MadmateSetting: Может угадывать Безумцев::0
        SubroleSetting: Может угадывать Подроли::0
        RestrictedToNonVote: Ограничен до не связанных с голосованием ролей
        FollowGuesserSettings: Следовать настройкам Угадывателя
      GuesserTitle: Угадыватель
      UnknownRole: Неизвестная роль {0}. Вы можете ввести '/cmd available', чтобы увидеть все роли, которые вы можете угадывать.
      HintMessage: У вас осталось {0} угадываний. Проголосуйте за игрока, чью роль хотите угадать.
      NoGuessesLeft: У вас закончились угадывания. Ваш следующий голос работает как обычно.
      SkippedGuessing: Вы вышли из режима угадывания. Ваш следующий голос работает как обычно.
      GuessDeathAnnouncement: >-
        Угадыватель сделал угадывание.

        {0} умер.
      CantGuessBecauseOfRole: Ваша роль не позволяет угадать {0}! Попробуйте другого игрока.
      CantGuessKnownRole: Вы видите роль {0}! Вы не можете угадать этого игрока.
      CantGuessTeammate: "{0} — ваш союзник! Вы не можете угадать этого игрока."
      PickedRoleText: >-
        Вы пытаетесь угадать {0} как {1}. Чтобы подтвердить угадывание, проголосуйте за этого игрока снова.

        Иначе проголосуйте за другого игрока для сброса процесса.
      PickedPlayerText: Вы выбрали угадать роль {0}. Чтобы выбрать роль, введите `/cmd [название роли]`. Эта команда будет скрыта от других игроков.
    GuesserRoleBase:
      GuesserRoleBase: Угадыватель
      PickedRoleText: Вы собираетесь угадать {0} как {1}. Если вы уверены в этом, проголосуйте за {0} снова для подтверждения угадывания. Или выберите другого игрока, проголосовав за него.. ИЛИ выберите другую роль, введя /cmd [название роли]
      PickedPlayerText: Вы угадываете роль {0}. Чтобы угадать их роль, введите /cmd [название роли].
      TypeRText: Пожалуйста, введите /cmd [название роли], чтобы угадать эту роль.
      UnknownRole: Неизвестная роль {0}. Вы можете использовать /cmd available, чтобы увидеть все доступные роли для угадывания.
      FinishedGuessingText: Вы подтвердили угадывание. Если вы не умерли, теперь вы можете голосовать обычным образом.
      ErrorCompletingGuess: Ошибка завершения угадывания. Вы можете попробовать угадать снова.
      GuessAnnouncementMessage: Угадыватель сделал угадывание. {0} умер.
    Lagger:
      Blurb: Случайные зависания
      Description: >-
        Это роль первого апреля. Она будет появляться в настройках и спауниться только с 1 по 7 апреля.\nКаждые 0,1-20 секунд игрок будет принудительно останавливаться на 0,05-4 секунды, затрудняя перемещение по карте. После смерти игрока это прекратится.
      RoleName: Лагер
    LastResort:
      RoleName: Последний шанс
      Description: Как Последний шанс, вы можете проголосовать за себя, чтобы получить дополнительные голоса на оставшуюся часть матча. Этот голос отменяется, и после этого вы можете голосовать за кого угодно.\n\nНедостаток — ваша роль теперь раскрывается всем на всеобщее обозрение.
      Blurb: Получай дополнительные голоса в последний момент
      Options:
        AdditionalVotes: Дополнительные голоса
      RevealText: '{0} был раскрыт как {1}!'
      HintText: Проголосуйте за себя, чтобы раскрыть свою роль и получить дополнительные голоса, или проголосуйте за любого другого игрока обычным образом.
    Nimble:
      RoleName: Ловкий
      Description: Даёт любой роли возможность использовать вентиляцию, даже если они не могли делать это раньше.
      Blurb: Получи способность использовать вентиляцию!
    Oblivious:
      RoleName: Беспечный
      Description: Игрок с модификатором Беспечный не может сообщать о трупах. Роли, зависящие от сообщения о трупах (например, Медиум), не могут получить модификатор Беспечный.
      Blurb: Не может сообщать о трупах
      Options:
        PassOnDeath: Передаётся при смерти
    Obvious:
      RoleName: Очевидный
      Description: Очевидный автоматически сообщает о трупах, с которыми сталкивается.
      Blurb: Автоматически сообщает о трупах
    Rebellious:
      RoleName: Бунтарь
      Description: Модификатор Бунтарь позволяет пользователю сохранить способности своей роли, став Безумцем.\n\nЭто означает, что игрок перешёл на сторону Предателей и считается врагом экипажа, поэтому такие роли, как Стукач, могут раскрыть Бунтаря.
      Blurb: Завоёвывай доверие экипажа
      Options:
        AssignToNK: Назначать НК
        AssignToNP: Назначать НП
        FactionMaxRogues: 'Максимум Бунтарей::0 от фракции {0}'
    Rogue:
      RoleName: Нарушитель
      Description: Модификатор Нарушитель позволяет пользователю сохранить способности своей роли, также получив возможность убивать.\n\nУбей всех остальных игроков для победы. Если Член экипажа или Предатель получает модификатор Нарушитель, они не победят вместе со своими командами.
      Blurb: Используй свои способности, чтобы убить всех
      Options:
        RestrictToCompatbileRoles: Ограничить совместимыми ролями
        FactionMaxRogues: 'Максимум Нарушителей::0 от фракции {0}'
    Romantic:
      RoleName: Романтик
      Blurb: Выбери партнёра для совместной жизни
      Description: Во время первого собрания игры Романтик ДОЛЖЕН проголосовать за игрока, чтобы тот стал его партнёром (иначе умрёт). После выбора партнёра Романтик может использовать кнопку питомца для временного предоставления щита своему партнёру.\n\nЕсли партнёр Романтика умирает, он превращается в Мстительного Романтика или Безжалостного Романтика в зависимости от настроек хоста.\n\nРомантик может победить с партнёром или без него (только одиночная победа) в зависимости от настроек хоста.
      Options:
        TargetKnowsRomantic: Уведомить цель о романе
        ProtectionCooldown: Откат защиты
        ProtectionDuration: Длительность защиты
        PartnerCanWin: Партнёр может победить вместе с Романтиком
        CancelGameWinIfSolo: Отменять победу в игре при одиночной победе
      PartnerText: Партнёр::0 {0} ♥::0
      RomanticMessage: Вы — Романтик. Вы должны выбрать партнёра до конца этого собрания или умрёте! Чтобы выбрать партнёра, проголосуйте за него дважды! После этого вы можете голосовать обычным образом.
      RomanticSelectMessage: Вы выбрали {0} своим партнёром. Для подтверждения проголосуйте за него снова, иначе проголосуйте за другого игрока.
      ConfirmedPartnerMessage: Вы подтвердили {0} как своего партнёра. Теперь вы можете голосовать обычным образом.
      NotifyPartnerMessage: Игрок {0} выбрал вас своим романтическим партнёром! Поздравляем!
      NoSkipMessage: Нельзя пропустить голос, пока не выбран партнёр!
    RuthlessRomantic:
      RoleName: Безжалостный романтик
      Blurb: Не оставляй никого в живых
      Description: "Безжалостный романтик назначается игрокам, у которых был модификатор Романтик и чей романтический партнёр был убит. Они действуют как обычный нейтральный убийца, побеждая в одиночку. Если игрок с этой ролью изначально был Членом экипажа, кнопка питомца функционирует как кнопка убийства с индикатором 'CD: Xс' для отката убийства."
    Sleuth:
      RoleName: Сыщик
      Description: Используйте кнопку сообщения о трупе для получения информации. На собрании Сыщик получает сообщение, раскрывающее роль мёртвого игрока.\n\nСыщик может видеть роль мёртвого игрока только если сам сообщил о трупе.
      Blurb: Узнавай роли погибших игроков
    Slowpoke:
      Blurb: Очень медленный
      Description: >-
        Это роль первого апреля. Она будет появляться в настройках и спауниться только с 1 по 7 апреля.\nСкорость игрока значительно снижена (в четыре раза). После смерти игрока его скорость вернётся к норме.
      RoleName: Тихоход
    Sneezer:
      Blurb: Случайно вызывает собрания
      Description: >-
        Это роль первого апреля. Она будет появляться в настройках и спауниться только с 1 по 7 апреля.\nКаждый раунд после первого игрок будет вынужден вызвать экстренное собрание через 30-120 секунд после начала раунда. Если игрок умирает в это время, собрание не будет вызвано.
      RoleName: Чихальщик
    TieBreaker:
      RoleName: Решающий голос
      Description: Если на собрании возникает равенство голосов между двумя игроками, голос Решающего голоса решит, кого изгнать или пропустить.
      Blurb: Разрешай ничьи
      TieBreakerMessage: Ничья была разрешена {0}!
    Torch:
      RoleName: Факел
      Description: Факел не подвержен отключению света.
      Blurb: Не подвержен отключению света
    Unstoppable:
      RoleName: Неудержимый
      Blurb: Пробивайся сквозь противников
      Description: Игроки с модификатором Неудержимый могут убивать сквозь большинство видов защиты, включая щиты Медика.\n\nВ зависимости от настроек хоста это может включать даже «чистый» иммунитет, например у Бегуна заданий.
      Options:
        CanKillUntargetable: Может убивать неатакуемых игроков
    VengefulRomantic:
      RoleName: Мстительный романтик
      Blurb: Отомсти за свою истинную любовь
      Description: Мстительный романтик назначается игрокам, у которых был модификатор Романтик и чей романтический партнёр был убит. Его цель — выследить убийцу партнёра и убить его. Мстительный романтик может использовать кнопку питомца или убийства (если есть), чтобы убить другого игрока, но если он атакует невиновного игрока, Мстительный романтик умрёт от промаха. После успешного мщения Мстительный романтик возвращает обычную победу вместе со своей базовой ролью.
      Adjective: Мстительный
      Options:
        CanKillBystanders: Может убивать посторонних
        ArrowToKiller: Стрелка к убийце
        SuicideAfterRevenge: Самоубийство после мести
    Watcher:
      RoleName: Наблюдатель
      Description: Может видеть голоса всех на собраниях, даже когда включено анонимное голосование. Наблюдатель не назначается никому, когда анонимное голосование отключено в настройках игры.
      Blurb: Может видеть голоса на собраниях для всех
    Workhorse:
      RoleName: Трудяга
      Description: Модификатор Трудяга даёт игроку дополнительные задания сверх уже назначенных.
      Blurb: Трудится усердно, имеет больше заданий
      Options:
        AdditionalShortTasks: Дополнительные короткие задания
        AdditionalLongTasks: Дополнительные длинные задания
    Subroles:
      Sleuth:
        SleuthMessage: Вы определили, что {0} был {1}! Отличная работа, Детектив!
        SleuthTitle: Сыщик {0}
    Illegal:
      RoleName: <Roles.Illegal.RoleName>
      Blurb: <Roles.Illegal.Blurb>
    LoversReal:
      RoleName: <Roles.LoversReal.RoleName>
      Blurb: <Roles.LoversReal.Blurb>
