      PlayerSelector:
        SelectPlayerString: 'Вы выбрали: <b>{0}</b>'
        UnselectPlayerString: 'Вы сняли выбор: <b>{0}</b>'
        ConfirmationString: 'Вы подтвердили: <b>{0}</b>'
    Debugger:
      RoleName: <Roles.Debugger.RoleName>
      Blurb: <Roles.Debugger.Blurb>
    Painter:
      GracePeriodText: 'Период без убийств: {0}'
      RoleName: Художник
      Blurb: Убивай противоположные цвета
      Description: Избавляйтесь от игроков с разными цветами. В зависимости от настроек хоста вы либо убиваете других игроков, либо меняете их цвет на свой.
    Striker:
      ReviveCooldown: 'Возрождение через: {0}'
      GrabbedFlag: Вы подобрали флаг! Противоположная команда получает стрелки к вашему местоположению!
      RoleName: Нападающий
      Blurb: Защищай свой флаг
      Description: Используйте кнопку питомца на флаге противоположной команды, чтобы подобрать его. Все игроки получат стрелку, указывающую на ваше местоположение, когда у вас есть флаг.\nВ зависимости от настроек хоста вы можете двигаться медленнее или больше не использовать вентиляцию. Когда кто-то нажимает кнопку убийства на вас, вы не умрёте. Вместо этого вы телепортируетесь на несколько секунд. После окончания времени возрождения вы телепортируетесь обратно на базу.
      OvertimeTitle: <b>ОВЕРТАЙМ</b>
      OvertimeDeathMessage: Хост включил <b>«Внезапную смерть»</b> на овертайме, что означает отключение возрождения.
      CaptureButtonText: Захватить
      TakeButtonText: Взять
      GracePeriodTime: >-
        Неуязвимость заканчивается

        через: {0}
    Seeker:
      Blurb: Убивай всех прячущихся до окончания таймера.
      Description: >-
        Это обычная роль Among Us. Убей всех до истечения времени для победы.
      RoleName: Искатель
    Hider:
      Blurb: Прячься от Искателя
      Description: >-
        Это обычная роль Among Us. Избегай убийства Искателем до истечения времени для победы. Используй вентиляцию в своих интересах.
      RoleName: Прячущийся
    Drafter:
      RoleName: Составитель
      Blurb: Выбирай свою следующую роль
      Description: В начале игры Составитель может выбрать свою роль из набора предложенных ролей. Эта роль появляется только в игровом режиме «Драфт».
