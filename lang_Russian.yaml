        ButtonText: Настройки ЗФ
        Description: Измените всё о ЗФ здесь!
        GamemodeDescription: Стандартный захват флага. Игроки должны захватить флаг противоположной команды и доставить его на свою базу для набора очков. При попадании вы возрождаетесь через короткое время. После возрождения вы также будете неуязвимы некоторое время, пока оно не истечёт или вы не убьёте игрока.
      Colorwars:
        Name: Цветовые войны
        ButtonText: Настройки цветовых войн
        Description: Измените настройки цветовых войн здесь!
        GamemodeDescription: Игроки делятся на команды и получают случайные цвета.\nЕсли включён режим преобразования цвета, попытка убить игрока изменит его цвет на ваш. Игра заканчивается, когда остаётся только один цвет. Если включена внезапная смерть, когда количество цветов опускается до числа, заданного хостом, игроки начинают убивать друг друга вместо преобразования.\n\nЕсли режим преобразования цвета отключён, игроки должны убивать игроков других цветов, чтобы устранить их. Игра заканчивается, когда остаётся только один цвет.
