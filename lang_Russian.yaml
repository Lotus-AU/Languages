        DraftTitle: Режим игры Драфт
        RandomOption: Случайный
        PlayerEndTurn: Игрок {0} выбрал {1}.
        PlayerSwapChoice: 'Теперь ваш выбор: {0}. Пропустите для подтверждения.{1}'
        PlayerChoiceOptions: >-
          Ваши варианты для выбора: {0}

          Проголосуйте за любого игрока для смены выбора.
        PlayerStartsTurn: Игрок {0} теперь выбирает свою роль. У него есть {1} секунд для принятия решения, иначе будет автоматически выбрана случайная роль.
        GamemodeDescription: Это вариант стандартного режима игры. Здесь можно использовать любую роль из стандартного режима.\n\nЭтот режим работает как стандартный, cначала выбираются все роли для назначения. Однако они не назначаются, а добавляются в список. В начале игры вызывается собрание. В этом собрании вы получаете сообщение с числом — вашим ID. Каждый игрок (начиная с наименьшего (1) до количества игроков) по очереди выбирает роль из случайного набора из списка. (Количество предлагаемых ролей задаётся хостом.) Вы можете проголосовать за любого игрока для смены выбора. Если среди предложенных ролей нет нужной, всегда есть дополнительный вариант «Случайный». Он выбирает любую ещё не выбранную роль из списка. Когда выбор сделан, пропустите голос для подтверждения. Если вы не выберете роль вовремя, случайная роль будет выбрана автоматически. Выбранный вариант будет объявлен в чате. Все узнают, что эта роль была выбрана, но не кем.\n\nПосле того как все игроки выбрали роли, собрание завершится и игра начнётся в обычном режиме.
